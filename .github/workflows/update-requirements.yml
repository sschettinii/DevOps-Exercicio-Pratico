name: Auto Update Requirements

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] # Roda quando um PR for ABERTO para a main

jobs:
  update-reqs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }} # Necessário para fazer o push de volta

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar pipreqs
        run: pip install pipreqs

      - name: Gerar novo requirements.txt
        run: pipreqs . --force

      - name: Verificar se houve mudanças
        id: verify_diff
        run: |
          git diff --quiet requirements.txt || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit e Push das mudanças
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git commit -m "chore: auto-update requirements.txt [skip ci]"
          git push