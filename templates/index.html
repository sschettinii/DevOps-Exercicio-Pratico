<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo - Sistema de Tarefas DevOps</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { border-bottom: 2px solid #3d444d; padding-bottom: 10px; color: #58a6ff; }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #3d444d; background: #0d1117; color: white; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #238636; color: white; }
        .task-list { list-style: none; padding: 0; }
        .task-item { background: #2d333b; margin-bottom: 10px; padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444c56; }
        .task-info { display: flex; align-items: center; gap: 10px; }
        .badge { font-size: 10px; background: #30363d; padding: 2px 6px; border-radius: 10px; color: #8b949e; }
        .actions button { background: transparent; border: 1px solid #f85149; color: #f85149; font-size: 12px; padding: 5px; }
        .actions .btn-edit { border-color: #d29922; color: #d29922; margin-right: 5px; }
        .tarefa-concluida {
            text-decoration: line-through;
            color: #8b949e; /* Um cinza para dar aspecto de desativado */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerenciador de Tarefas <span style="font-size: 14px; font-weight: normal;">(v1.0 Demo)</span></h2>
    
    <div class="form-group">
        <button class="btn-add"><a href='/formulario'>Adicionar</a></button>
    </div>

    <ul class="task-list">
        {% for tarefa in tarefas %}
        <li class="task-item">
            <div class="task-info">
                <input type="checkbox" 
                       class="check-tarefa" 
                       data-id="{{ tarefa.id }}" 
                       {% if tarefa.status %}checked{% endif %}>
                <span id="titulo-{{ tarefa.id }}" class="{% if tarefa.status %}tarefa-concluida{% endif %}">{{ tarefa.titulo }}</span>
                <span class="badge">#{{ tarefa.id }}</span>
            </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">

            <a href="{{ url_for('edit_task', id=tarefa.id) }}" style="padding: 5px 10px; background-color: #58a6ff; color: #0d1117; text-decoration: none; border-radius: 4px; font-weight: bold;">
                Editar
            </a>

            <form action="{{ url_for('delete_task', id=tarefa.id) }}" method="POST" style="margin: 0;" onsubmit="return confirm('Tem certeza que deseja excluir esta tarefa?');">
                <button type="submit" style="padding: 5px 10px; background-color: #da3633; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                    Excluir
                </button>
            </form>

        </div>
        </li>
        {% endfor %}
    </ul>

    <p style="font-size: 12px; color: #8b949e; text-align: center; margin-top: 20px;">
        Conectado ao SQLite: <span style="color: #3fb950;">Ativo</span>
    </p>
</div>

<script>
    // Seleciona todos os checkboxes com a classe 'check-tarefa'
    document.querySelectorAll('.check-tarefa').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const tarefaId = this.getAttribute('data-id');
            const status = this.checked; // Retorna true ou false

            // Envia a requisição assíncrona para o Flask
            fetch(`/update_status/${tarefaId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ status: status })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('Status atualizado com sucesso!');
                    // Opcional: riscar o texto se estiver concluído
                    const span = document.getElementById(`titulo-${tarefaId}`);
                    if (status) {
                        span.style.textDecoration = 'line-through';
                        span.style.color = 'grey';
                    } else {
                        span.style.textDecoration = 'none';
                        span.style.color = 'white';
                    }
                } else {
                    alert('Erro ao atualizar status.');
                    this.checked = !status; // Reverte o checkbox em caso de erro
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                this.checked = !status;
            });
        });
    });
</script>

</body>
</html>
