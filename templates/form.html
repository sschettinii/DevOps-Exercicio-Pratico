<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Simples</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            border-bottom: 2px solid #3d444d;
            padding-bottom: 10px;
            color: #58a6ff;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, textarea {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #3d444d;
            background: #0d1117;
            color: white;
        }

        textarea {
            resize: vertical;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: #238636;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Formulário de Tarefa</h2>

    <form action="/add" method="POST">
        <div class="form-group">
            <input type="text" name="titulo" placeholder="Nova tarefa..." required>
        </div>

        <div class="form-group">
            <textarea name="descricao" rows="3" placeholder="Descrição da tarefa"></textarea>
        </div>

        <div class="form-group">
            <label style="color: grey;">
                <input type="checkbox" name="status">
                Concluída
            </label>
        </div>

        <button type="submit" class="btn-add">Adicionar</button>
    </form>
</div>

</body>
</html>
